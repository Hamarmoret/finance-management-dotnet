steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.frontend'
      - '--build-arg'
      - 'VITE_API_URL=${_API_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/finance-frontend:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/finance-frontend:latest'
      - '.'

substitutions:
  _API_URL: 'https://finance-backend-233195483413.me-west1.run.app'

images:
  - 'gcr.io/$PROJECT_ID/finance-frontend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/finance-frontend:latest'
